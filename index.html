<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lupo Solitario – Motore di gioco</title>
<style>
  body { font-family: sans-serif; margin: 20px; background: #222; color: #eee; }
  .light-mode { background: #fafafa; color: #111; }
  header { display:flex; justify-content:space-between; align-items:center; }
  button { padding: 8px 12px; margin: 5px; cursor: pointer; }
  #log { white-space: pre-wrap; background: #333; padding: 10px; height: 150px; overflow:auto; }
</style>
</head>
<body>
<header>
  <h1>Lupo Solitario – Creazione e Combattimento</h1>
  <button id="themeBtn">Tema chiaro</button>
</header>

<section id="creazione">
  <h2>Creazione Personaggio</h2>
  <button id="rollStats">Genera CS e END</button>
  <p>Combattività: <span id="cs">?</span>, Resistenza: <span id="end">?</span></p>
  <p><button id="pickDisc">Assegna 5 Arti Ramas casuali</button></p>
  <ul id="disciplineList"></ul>
  <p><button id="rollEquip">Estrai Equipaggiamento</button></p>
  <ul id="equipList"></ul>
  <p><button id="startCombat">Attacca Drakkar (CS 8, END 10)</button></p>
</section>

<section id="combattimento">
  <h2>Combattimento</h2>
  <div id="log">Qui appariranno i messaggi di combattimento.</div>
</section>

<script>
// Valori base e liste
let baseCS = 10, baseEND = 20;
let cs=0, endu=0, disciplines=[], equip=[];

// Elenco Arti e opzioni equip
const allDisc = ["Mimetismo","Caccia","Sesto Senso","Orientamento","Guarigione",
                 "Scherma","Psicoschermo","Psicolaser","Affinità Animale","Telecinesi"];
const equipOptions = [
  "Spadone","Mazza","Quartapugno","Lancia","Spada",
  "Pozione di Cura","2x Pasto",
  "Cotta di Maglia (+4 END)","Elmo (+2 END)",
  "12 Corone d'oro"
];

// Toggle tema
const themeBtn = document.getElementById('themeBtn');
themeBtn.onclick = () => {
  document.body.classList.toggle('light-mode');
  themeBtn.textContent = document.body.classList.contains('light-mode') ? 'Tema scuro' : 'Tema chiaro';
};

// Generazione Combattività/Resistenza
document.getElementById('rollStats').onclick = () => {
  cs = baseCS + Math.floor(Math.random()*10);
  endu = baseEND + Math.floor(Math.random()*10);
  // Bonus arma insegnata (ascia di base)
  cs += 2;  // Ascia conferisce +2 CS secondo regole
  document.getElementById('cs').textContent = cs;
  document.getElementById('end').textContent = endu;
};

// Selezione 5 Arti Ramas casuali
document.getElementById('pickDisc').onclick = () => {
  disciplines = [];
  while(disciplines.length < 5) {
    let choice = allDisc[Math.floor(Math.random()*allDisc.length)];
    if(!disciplines.includes(choice)) disciplines.push(choice);
  }
  let list = document.getElementById('disciplineList');
  list.innerHTML = "";
  disciplines.forEach(d => {
    let li = document.createElement('li');
    li.textContent = d;
    list.appendChild(li);
  });
};

// Estrazione equipaggiamento
document.getElementById('rollEquip').onclick = () => {
  equip = [];
  // 0-9 Corone d'oro
  let gold = Math.floor(Math.random()*10);
  equip.push(gold + " Corone d'oro");
  // Mappa e Ascia fisse
  equip.push("Mappa delle Terre Esterne", "Ascia (arbitraria)");
  // Un pasto
  equip.push("Pasto x1");
  // Estrai 0-9 per altro oggetto
  let roll = Math.floor(Math.random()*10);
  equip.push(equipOptions[roll]);
  // Visualizza equipaggiamento
  let eqList = document.getElementById('equipList');
  eqList.innerHTML = "";
  equip.forEach(item => {
    let li = document.createElement('li');
    li.textContent = item;
    eqList.appendChild(li);
  });
  console.log("DEBUG: Equip iniziale:", equip);
};

// Combattimento di esempio contro Drakkar (CS 8, END 10)
document.getElementById('startCombat').onclick = () => {
  let enemyCS = 8, enemyEND = 10;
  let log = document.getElementById('log');
  log.textContent = "";
  console.log(`DEBUG: Inizia combattimento: CS_Lupo=${cs}, END_Lupo=${endu}, CS_Nem=${enemyCS}, END_Nem=${enemyEND}`);
  // Turni di combattimento
  while (endu > 0 && enemyEND > 0) {
    // Aggiungi bonus discipline (esempio Psicolaser/Mindblast +2 CS una tantum)
    let totalCS = cs;
    if (disciplines.includes("Psicolaser")) {
      totalCS += 2;
      log.textContent += "Usi Psicolaser (+2 Combattività temporanea)\n";
      console.log("DEBUG: Psicolaser attivata, CS totale:", totalCS);
      // Rimuoviamolo per non riusarlo sempre
      disciplines = disciplines.filter(d => d!=="Psicolaser");
    }
    // Calcola rapporto di forza
    let ratio = totalCS - enemyCS;
    log.textContent += `Rapporto di Forza: ${ratio} (CS ${totalCS} - ${enemyCS})\n`;
    console.log("DEBUG: Rapporto di forza:", ratio);
    // Tiro casuale d10
    let dice = Math.floor(Math.random()*10)+1;
    log.textContent += `Estrai numero casuale: ${dice}\n`;
    // Tabella semplificata: danni = abs(ratio) + random
    let damageToEnemy = Math.max(0, ratio) + Math.floor(Math.random()*5);
    let damageToPlayer = Math.max(0, -ratio) + Math.floor(Math.random()*5);
    enemyEND -= damageToEnemy;
    endu -= damageToPlayer;
    log.textContent += `Infliggi ${damageToEnemy} danni al nemico, subisci ${damageToPlayer} danni.\n`;
    console.log(`DEBUG: END nemico=${enemyEND}, END Lupo=${endu}`);
    if (enemyEND <= 0) {
      log.textContent += "Hai sconfitto il nemico!\n";
      break;
    }
    if (endu <= 0) {
      log.textContent += "Sei stato sconfitto...\n";
      break;
    }
    log.textContent += "--- Nuovo round ---\n";
  }
};
</script>
</body>
</html>
